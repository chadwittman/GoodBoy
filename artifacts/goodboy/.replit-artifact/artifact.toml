kind = "web"
previewPath = "/"
title = "GoodBoy"
version = "1.0.0"
id = "artifacts/goodboy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24786

[services.development]
run = "pnpm --filter @workspace/goodboy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/goodboy", "run", "build" ]
publicDir = "artifacts/goodboy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24786"
BASE_PATH = "/"
